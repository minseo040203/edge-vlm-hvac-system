version: 2

updates:
  # npm 의존성 업데이트
  - package-ecosystem: "npm"
    directory: "/week9"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "npm"
      - "automated"
    target-branch: "main"
    rebase-strategy: "auto"
    ignore:
      # 필요 시 실제 무시할 패키지명으로 교체
      - dependency-name: "some-package"
        versions:
          - "1.x"
    groups:
      npm-development-dependencies:
        dependency-type: "development"
        patterns:
          - "@*"
          - "eslint*"
          - "prettier*"
          - "typescript*"
        update-types:
          - "minor"
          - "patch"
      npm-production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"

  # Python 의존성 업데이트
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "chore(python-deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "automated"
    target-branch: "main"
    rebase-strategy: "auto"
    ignore:
      # Jetson 호환성을 위해 PyTorch 계열은 특정 이상 버전 업데이트 방지
      - dependency-name: "torch"
        versions:
          - ">=2.1"
      - dependency-name: "torchvision"
        versions:
          - ">=0.17"
    groups:
      pytorch-dependencies:
        patterns:
          - "torch"
          - "torchvision"
          - "torchaudio"
        update-types:
          - "patch"
      transformers-dependencies:
        patterns:
          - "transformers*"
          - "accelerate*"
          - "qwen*"
        update-types:
          - "minor"
          - "patch"
      python-patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"

  # Docker 베이스 이미지 업데이트
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"
      - "automated"
    target-branch: "main"
    rebase-strategy: "auto"
    groups:
      docker-base-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions 업데이트
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "04:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(actions)"
      include: "scope"
    labels:
      - "dependencies"
      - "ci/cd"
      - "github-actions"
      - "automated"
    target-branch: "main"
    rebase-strategy: "auto"
    groups:
      github-actions-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"