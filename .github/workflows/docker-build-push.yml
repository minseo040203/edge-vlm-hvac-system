name: 🐳 Docker 이미지 빌드 & 푸시

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'requirements_jetson.txt'
      - 'week9/**'
      - '.github/workflows/docker-build-push.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🔐 Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 메타데이터 추출
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🛠 QEMU 에뮬레이션 설정
        uses: docker/setup-qemu-action@v3

      - name: 🏗 Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧪 로컬 실행 검증 (PR 또는 main)
        if: always()
        run: |
          echo "🐳 Docker 이미지 빌드 완료"
          echo ""
          echo "**이미지 정보:**"
          echo "- 레지스트리: ${{ env.REGISTRY }}"
          echo "- 이름: ${{ env.IMAGE_NAME }}"
          echo "- 태그: ${{ steps.meta.outputs.tags }}"
          echo ""
          echo "**로컬 검증:**"
          echo "- 이미지 다운로드: \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`"
          echo "- 로컬 실행: \`docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`"

      - name: 📝 배포 결과 요약
        if: success()
        run: |
          cat > /tmp/docker_build_summary.txt << 'EOF'
          ✅ Docker 빌드 및 푸시 완료
          
          이미지 정보:
          - Registry: ${{ env.REGISTRY }}
          - Repository: ${{ env.IMAGE_NAME }}
          - Tags: ${{ steps.meta.outputs.tags }}
          
          실행 명령어:
          docker run -it ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          플랫폼 지원:
          - linux/amd64
          - linux/arm64
          EOF
          cat /tmp/docker_build_summary.txt

      - name: 📤 배포 결과를 Artifact로 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-summary
          path: /tmp/docker_build_summary.txt
          retention-days: 30

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: 🔒 Trivy 보안 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: 📊 Trivy 결과 업로드
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
