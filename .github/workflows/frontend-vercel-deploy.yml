name: Frontend Vercel Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend-vercel-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend-vercel-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment for Preview
        if: github.event_name == 'pull_request'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Pull Vercel Environment for Production
        if: github.event_name != 'pull_request'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Frontend for Preview
        if: github.event_name == 'pull_request'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Frontend for Production
        if: github.event_name != 'pull_request'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Preview to Vercel
        id: deploy_preview
        if: github.event_name == 'pull_request'
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Production to Vercel
        id: deploy_production
        if: github.event_name != 'pull_request'
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health Check Preview
        if: github.event_name == 'pull_request'
        run: |
          curl -f "${{ steps.deploy_preview.outputs.deployment_url }}"

      - name: Health Check Production
        if: github.event_name != 'pull_request'
        run: |
          curl -f "${{ steps.deploy_production.outputs.deployment_url }}"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy_preview.outputs.deployment_url }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Vercel Preview Deployment 완료\n\nPreview URL: ${url}`
            });

      - name: Create Deployment Summary
        run: |
          mkdir -p deployment-report

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            URL="${{ steps.deploy_preview.outputs.deployment_url }}"
            TYPE="preview"
          else
            URL="${{ steps.deploy_production.outputs.deployment_url }}"
            TYPE="production"
          fi

          cat > deployment-report/frontend-deployment.md << EOF
          # Frontend Deployment Report

          - Type: $TYPE
          - URL: $URL
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Status: Success
          EOF

          cat deployment-report/frontend-deployment.md

      - name: Upload Deployment Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deployment-report
          path: deployment-report/frontend-deployment.md
          retention-days: 30