name: Frontend Vercel Deploy

'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Create build report
        run: |
          mkdir -p deployment-report

          cat > deployment-report/frontend-deployment.md << EOF
          # Frontend Deployment Report

          - Status: Frontend build success
          - Platform: Vercel ready
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Event: ${{ github.event_name }}

          Vercel 배포를 위해 다음 GitHub Secrets 설정이 필요합니다.

          - VERCEL_TOKEN
          - VERCEL_ORG_ID
          - VERCEL_PROJECT_ID

          Production 헬스체크를 위해 다음 GitHub Secret 설정이 필요합니다.

          - PRODUCTION_URL
          EOF

          cat deployment-report/frontend-deployment.md

      - name: Upload frontend deployment report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deployment-report
          path: deployment-report/frontend-deployment.md
          retention-days: 30

  vercel-deploy:
    name: Vercel deploy
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are not configured. Skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are configured."
          fi

      - name: Skip Vercel deploy when secrets are missing
        if: steps.check_secrets.outputs.configured == 'false'
        run: |
          echo "Vercel 배포 Secret이 없어 배포를 건너뜁니다."
          echo "프런트엔드 빌드 검증은 완료되었습니다."

      - name: Install Vercel CLI
        if: steps.check_secrets.outputs.configured == 'true'
        run: npm install -g vercel

      - name: Pull Vercel environment
        if: steps.check_secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        if: steps.check_secrets.outputs.configured == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        if: steps.check_secrets.outputs.configured == 'true'
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health check deployed URL
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          curl -L -f "${{ steps.deploy.outputs.deployment_url }}"