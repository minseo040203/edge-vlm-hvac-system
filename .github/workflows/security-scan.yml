name: 🔒 보안 스캔 (npm audit & Snyk)

on:
  push:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'requirements_jetson.txt'
      - 'week9/**'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main]
  schedule:
    # 매일 UTC 0시에 실행
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    name: 📦 npm audit 스캔
    
    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 📍 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 의존성 설치
        working-directory: ./week9
        run: npm ci --prefer-offline

      - name: 🔍 npm audit 실행
        id: audit
        working-directory: ./week9
        run: |
          npm audit --json > audit-report.json || true
          npm audit --production > audit-output.txt 2>&1 || true
          cat audit-output.txt

      - name: 📊 Audit 결과 분석
        id: analyze
        working-directory: ./week9
        run: |
          # JSON 파일에서 취약점 수 추출
          VULNERABILITIES=$(jq '.metadata.vulnerabilities.total' audit-report.json 2>/dev/null || echo "0")
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-report.json 2>/dev/null || echo "0")
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-report.json 2>/dev/null || echo "0")
          
          echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          
          echo "📊 npm audit 결과:"
          echo "- 총 취약점: $VULNERABILITIES"
          echo "- CRITICAL: $CRITICAL"
          echo "- HIGH: $HIGH"

      - name: 📤 Audit 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: week9/audit-report.json
          retention-days: 30

      - name: 🐛 취약점이 발견되었을 때 이슈 생성
        if: failure() && (steps.analyze.outputs.critical > 0 || steps.analyze.outputs.high > 0)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditData = JSON.parse(fs.readFileSync('week9/audit-report.json', 'utf8'));
            
            let issueBody = `## ⚠️ npm audit 보안 취약점 감지\n\n`;
            issueBody += `### 📊 통계\n`;
            issueBody += `- 총 취약점: ${auditData.metadata.vulnerabilities.total}\n`;
            issueBody += `- CRITICAL: ${auditData.metadata.vulnerabilities.critical}\n`;
            issueBody += `- HIGH: ${auditData.metadata.vulnerabilities.high}\n`;
            issueBody += `- MODERATE: ${auditData.metadata.vulnerabilities.moderate}\n\n`;
            
            issueBody += `### 📋 상세 정보\n`;
            issueBody += `\`\`\`json\n`;
            issueBody += JSON.stringify(auditData.vulnerabilities, null, 2).substring(0, 2000);
            issueBody += `\n\`\`\`\n\n`;
            
            issueBody += `### 🔧 해결 방법\n`;
            issueBody += `1. \`npm audit fix\` 명령어 실행\n`;
            issueBody += `2. 자세한 내용: [npm audit 문서](https://docs.npmjs.com/cli/v9/commands/npm-audit)\n`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 [보안] npm audit - ${auditData.metadata.vulnerabilities.total}개 취약점 감지`,
              body: issueBody,
              labels: ['security', 'npm-audit', 'dependencies']
            });

  snyk-scan:
    runs-on: ubuntu-latest
    name: 🔐 Snyk 보안 스캔
    
    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 📍 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🔐 Snyk 설치
        run: npm install -g snyk

      - name: 🔍 Snyk 스캔 실행
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: ./week9
        run: |
          snyk auth $SNYK_TOKEN
          snyk test --json > snyk-report.json || true
          snyk test --severity-threshold=high || true
        continue-on-error: true

      - name: 📤 Snyk 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: week9/snyk-report.json
          retention-days: 30

      - name: 📊 Snyk SARIF 변환
        if: always()
        run: |
          cd week9
          snyk test --sarif > snyk-results.sarif 2>/dev/null || true
        continue-on-error: true

      - name: 📤 Snyk 결과를 GitHub Security에 업로드
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'week9/snyk-results.sarif'
        continue-on-error: true

  python-security-check:
    runs-on: ubuntu-latest
    name: 🐍 Python 보안 스캔
    
    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 📍 Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: 🔧 Safety 설치
        run: pip install safety

      - name: 🔍 Safety 스캔 실행
        run: |
          safety check --file requirements_jetson.txt --json > safety-report.json || true
          safety check --file requirements_jetson.txt || true
        continue-on-error: true

      - name: 📤 Safety 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-safety-report
          path: safety-report.json
          retention-days: 30

  generate-security-report:
    needs: [npm-audit, snyk-scan, python-security-check]
    runs-on: ubuntu-latest
    name: 📋 보안 리포트 생성
    if: always()
    
    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 📥 Artifacts 다운로드
        uses: actions/download-artifact@v4
        with:
          path: ./security-reports

      - name: 📝 통합 보안 리포트 생성
        run: |
          cat > SECURITY_REPORT.md << 'EOF'
          # 🔒 보안 스캔 리포트
          
          **생성일:** $(date)
          
          ## 📊 스캔 요약
          
          ### npm audit
          - 상태: ${{ needs.npm-audit.result }}
          - 결과: [npm-audit-report](security-reports/npm-audit-report)
          
          ### Snyk
          - 상태: ${{ needs.snyk-scan.result }}
          - 결과: [snyk-report](security-reports/snyk-report)
          
          ### Python Safety
          - 상태: ${{ needs.python-security-check.result }}
          - 결과: [python-safety-report](security-reports/python-safety-report)
          
          ## 🔧 권장 조치 사항
          
          1. **npm audit fix** 실행
          2. Snyk 토큰 설정 확인
          3. 정기적인 보안 업데이트 검토
          
          ---
          *이 리포트는 자동으로 생성되었습니다.*
          EOF
          cat SECURITY_REPORT.md

      - name: 📤 리포트 Artifact 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: SECURITY_REPORT.md
          retention-days: 90

      - name: 💬 PR에 보안 리포트 댓글 작성
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('SECURITY_REPORT.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
        continue-on-error: true

      - name: 📌 리포트 저장소에 푸시
        if: github.ref == 'refs/heads/main' && always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add SECURITY_REPORT.md || true
          git commit -m "docs: 보안 스캔 리포트 업데이트 [skip ci]" || true
          git push origin main || true
        continue-on-error: true
