name: CI Matrix

on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements_jetson.txt'
      - '.github/workflows/ci-matrix.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-check:
    name: Python syntax check
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python syntax
        run: |
          python -m compileall .

  npm-check:
    name: npm install check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Run npm test
        run: npm test --if-present

  dockerfile-check:
    name: Dockerfile check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dockerfile exists
        run: |
          test -f Dockerfile
          docker version