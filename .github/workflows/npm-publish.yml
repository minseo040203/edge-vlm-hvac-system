name: npm 패키지 배포 및 버전 업데이트

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'main.py'
      - '**/*.py'
      - '.github/workflows/npm-publish.yml'
  workflow_dispatch:
    inputs:
      version_bump:
        description: '버전 업그레이드 유형'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  publish-npm:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kaj-edgevlm-hvac-project'

      - name: npm 인증 설정
        run: |
          echo "@kaj-edgevlm-hvac-project:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 의존성 설치
        run: npm ci

      - name: 현재 버전 확인
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "현재 버전: $CURRENT_VERSION"

      - name: 버전 업데이트
        id: bump_version
        run: |
          VERSION_BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          CURRENT=$(node -p "require('./package.json').version")
          npm version "$VERSION_BUMP" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "버전 업그레이드: $CURRENT -> $NEW_VERSION"

      - name: npm 패키지 배포
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Git 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.bump_version.outputs.new_version }} [skip ci]" || echo "커밋할 변경사항 없음"
          git push origin main

      - name: 배포 완료 로그
        run: |
          echo "npm 패키지 배포 완료"
          echo "이전 버전: ${{ steps.version.outputs.current_version }}"
          echo "새 버전: ${{ steps.bump_version.outputs.new_version }}"
          echo "설치 명령: npm install @kaj-edgevlm-hvac-project/edge-vlm-hvac-system@${{ steps.bump_version.outputs.new_version }}"