name: 📦 npm 패키지 배포 & 버전 업데이트

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'week9/**'
      - '.github/workflows/npm-publish.yml'
  workflow_dispatch:
    inputs:
      version_bump:
        description: '버전 업그레이드 유형'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📍 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'

      - name: 🔐 npm 인증 설정
        run: |
          echo "@kaj-edgevlm-hvac-project:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          npm whoami --registry https://npm.pkg.github.com

      - name: 📊 현재 버전 확인
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./week9/package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "📌 현재 버전: $CURRENT_VERSION"

      - name: 🆕 버전 업데이트
        id: bump_version
        run: |
          cd week9
          
          # 입력값이 없으면 자동으로 patch 업그레이드
          VERSION_BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          
          # 현재 버전
          CURRENT=$(node -p "require('./package.json').version")
          
          # 버전 업그레이드
          npm version $VERSION_BUMP --no-git-tag-v
          
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✅ 버전 업그레이드: $CURRENT → $NEW_VERSION"

      - name: 🚀 npm에 배포
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd week9
          npm publish
          echo "✅ 패키지가 성공적으로 배포되었습니다"

      - name: 🔄 Git 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add week9/package.json week9/package-lock.json 2>/dev/null || true
          git commit -m "chore: v${{ steps.bump_version.outputs.new_version }} 배포

- npm 패키지 버전 업데이트
- GitHub Packages에 배포
- Auto-generated by npm-publish workflow" || echo "커밋할 변경사항 없음"
          
          git push origin main

      - name: 📢 배포 완료 알림
        run: |
          echo "## 📦 npm 패키지 배포 완료"
          echo ""
          echo "- 이전 버전: ${{ steps.version.outputs.current_version }}"
          echo "- 새 버전: ${{ steps.bump_version.outputs.new_version }}"
          echo "- 레지스트리: https://npm.pkg.github.com/@kaj-edgevlm-hvac-project/edge-vlm-hvac-system"
          echo "- 설치 명령: \`npm install @kaj-edgevlm-hvac-project/edge-vlm-hvac-system@${{ steps.bump_version.outputs.new_version }}\`"

      - name: 💬 배포 결과를 GitHub에 업로드
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **npm 패키지 배포 완료**\n\n- 새 버전: \`${{ steps.bump_version.outputs.new_version }}\`\n- 레지스트리: [GitHub Packages](https://npm.pkg.github.com/@kaj-edgevlm-hvac-project/edge-vlm-hvac-system)`
            })
        if: always()
        continue-on-error: true
