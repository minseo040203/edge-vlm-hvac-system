name: Frontend Build and Vercel Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check frontend files
        run: |
          echo "PWD:"
          pwd

          echo "Root files:"
          ls -la

          echo "Tracked frontend package:"
          git ls-files frontend/package.json || true

          echo "Frontend directory:"
          ls -la frontend || true

          echo "Frontend src directory:"
          ls -la frontend/src || true

          test -f frontend/package.json
          test -f frontend/index.html
          test -f frontend/src/main.jsx

          echo "Frontend files exist."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Create deployment report
        run: |
          mkdir -p deployment-report
          cat > deployment-report/frontend-deployment.md << EOF
          # Frontend Deployment Report

          - Status: Frontend build success
          - Platform: Vercel ready
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Event: ${{ github.event_name }}

          ## Deployment Strategy

          This workflow validates the frontend build before deployment.
          Vercel production and preview deployment can be enabled by adding the following GitHub Secrets:

          - VERCEL_TOKEN
          - VERCEL_ORG_ID
          - VERCEL_PROJECT_ID

          ## Health Check

          Production monitoring can be enabled by adding:

          - PRODUCTION_URL
          EOF

          cat deployment-report/frontend-deployment.md

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deployment-report
          path: deployment-report/frontend-deployment.md
          retention-days: 30