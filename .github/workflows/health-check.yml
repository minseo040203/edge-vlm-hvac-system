name: Production Health Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check production URL
        id: health
        continue-on-error: true
        run: |
          HTTP_STATUS=$(curl -L -s -o /tmp/healthcheck.html -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}")
          echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Health check failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Health check passed with status $HTTP_STATUS"

      - name: Upload health check response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-response
          path: /tmp/healthcheck.html
          retention-days: 7

      - name: Create issue when health check fails
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Production health check failed';
            const body = [
              'Production URL health check failed.',
              '',
              `URL: ${{ secrets.PRODUCTION_URL }}`,
              `HTTP Status: ${{ steps.health.outputs.http_status }}`,
              '',
              '확인 항목:',
              '- Vercel 배포 상태 확인',
              '- 최근 커밋 확인',
              '- 프런트엔드 빌드 로그 확인'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['monitoring', 'health-check', 'frontend']
            });